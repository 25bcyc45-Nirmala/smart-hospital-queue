<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Hospital Queue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌟 Smart Hospital Queue System</h1>

    <div class="form-section">
      <h2>Register Patient</h2>
      <form id="patientForm">
        <input type="text" id="name" placeholder="Patient Name" required>
        <select id="department" required>
          <option value="">Select Department</option>
          <option value="OPD">OPD</option>
          <option value="Lab">Lab</option>
          <option value="Pharmacy">Pharmacy</option>
        </select>
        <label>
          <input type="checkbox" id="emergency"> Emergency 🚨
        </label>
        <button type="submit">Generate Token</button>
      </form>
    </div>

    <div class="queue-section">
      <h2>Current Queue</h2>
      <ul id="queueList"></ul>
      <button id="clearQueue">Clear Queue</button>
    </div>

    <div id="analytics" class="section">
      <h1>📊 Analytics Dashboard</h1>
      <div class="card-grid">
        <div class="card">
          <h3>Total Patients</h3>
          <p id="total">0</p>
        </div>
        <div class="card">
          <h3>Emergency Cases 🚨</h3>
          <p id="emergencyCount">0</p>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
